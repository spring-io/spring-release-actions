name: "compute-support-window"
description: "An action that determines whether a branch or version is in its OSS or commercial support window"
author: "jzheaux"

inputs:
  version:
    description: "The current project version (for example, '6.4.16-SNAPSHOT'). Either 'version' or 'ref-name' is required."
    required: false
  ref-name:
    description: "The branch or tag name (for example, '6.4.x'). Defaults to the GITHUB_REF_NAME environment variable. Either 'version' or 'ref-name' (or GITHUB_REF_NAME) is required."
    required: false
    default: ${{ github.ref_name }}
  repository:
    description: "The repository to use for project-slug derivation"
    required: false
    default: ${{ github.repository }}
  project-slug:
    description: "The project slug for the Projects API (https://api.spring.io/projects). Defaults to the repository name with `-commercial` stripped."
    required: false
  projects-api-base:
    description: "The base URL or filesystem path for the Projects API. Defaults to 'https://api.spring.io'. Use '.' to read generation metadata from the local 'projects/' directory."
    required: false
    default: "https://api.spring.io"

outputs:
  support-type:
    description: "The current support window for the generation: 'oss', 'commercial', or 'eol'."
  oss-end:
    description: "The OSS support end date for the generation, in YYYY-MM format."
  commercial-end:
    description: "The commercial support end date for the generation, in YYYY-MM format."

runs:
  using: "node24"
  main: '../dist/compute-support-window/main/index.js'
