name: "compute-version"
description: "An action that determines the project version from Maven or Gradle. For Maven projects, requires actions/setup-java."
author: "jzheaux"
outputs:
  version:
    description: "The version of the project"
    value: ${{ steps.compute-version.outputs.version }}
  snapshot:
    description: "Whether the version is a snapshot version"
    value: ${{ steps.compute-version.outputs.snapshot }}
runs:
  using: "composite"
  steps:
    - name: Get version from the project
      id: compute-version
      shell: bash
      run: |
        if test -f pom.xml
        then
          CURRENT_VERSION=$(mvn help:evaluate -Dexpression="project.version" -q -DforceStdout)
        else
          CURRENT_VERSION=$(cat gradle.properties | sed -n '/^version=/ { s/^version=//;p }')
        fi
        echo version=$CURRENT_VERSION >> $GITHUB_OUTPUT
        if [[ $CURRENT_VERSION == *"-SNAPSHOT" ]]; then
          echo snapshot=true >> $GITHUB_OUTPUT
        else
          echo snapshot=false >> $GITHUB_OUTPUT
        fi
