name: check-maven-artifact
on: push
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Start Maven repo server
        uses: ./__fixtures__/maven-repo-server
        with:
          known-versions: '["6.1.0"]'

      - name: Check artifact exists
        uses: ./check-maven-artifact
        with:
          repository-url: ${{ env.MAVEN_REPO_URL }}
          artifact-path: "org/springframework/spring-core"
          version: "6.1.0"
