name: schedule-milestone
on: push
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Start GitHub server
        uses: ./__fixtures__/github-server
        with:
          milestones: '[{"number":1,"title":"1.0.0","state":"open","due_on":"2025-01-01T00:00:00Z","description":""}]'
          port: "18081"

      - name: Create new milestone
        uses: ./schedule-milestone
        with:
          version: "2.0.0"
          version-date: "2025-06-01"
          repository: owner/repo
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update existing milestone
        uses: ./schedule-milestone
        with:
          version: "1.0.0"
          version-date: "2025-01-15"
          description: "Updated"
          repository: owner/repo
          token: ${{ secrets.GITHUB_TOKEN }}
