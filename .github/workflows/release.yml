name: "Perform Release"

permissions:
  contents: write
  issues: write

on:
  workflow_dispatch:

jobs:
  planner:
    name: "Is there a release that is ready today?"
    runs-on: ubuntu-latest
    outputs:
      release-version: ${{ steps.release-version.outputs.release-version }}
      should-release: ${{ steps.release-version.outputs.release-version != '' && steps.release-version.outputs.days-til-release == '0' && steps.count-issues.outputs.count == '0' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: release-version
        uses: ./compute-next-scheduled-milestone
        with:
          milestone-token: ${{ github.token }}
          snapshot-version: ${{ github.ref_name }}
      - if: ${{ steps.release-version.outputs.release-version != '' && steps.release-version.outputs.days-til-release == '0' }}
        id: count-issues
        uses: ./count-open-issues
        with:
          milestone: ${{ steps.release-version.outputs.release-version }}
  releaser:
    name: "Perform the Release"
    needs: planner
    if: ${{ needs.planner.outputs.should-release == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Generate Changelog
        uses: spring-io/github-changelog-generator@f7d7a87a3e7c627ecb8c26cf086c38ac5a939721 # v0.0.14
        with:
          milestone: ${{ needs.planner.outputs.release-version }}
          token: ${{ github.token }}
          config-file: etc/release-notes-sections.yml
      - name: Publish Changelog
        uses: ./publish-release-notes
        with:
          tag: ${{ needs.planner.outputs.release-version }}
      - name: Close Release Milestone
        uses: ./close-milestone
        with:
          version: ${{ needs.planner.outputs.release-version }}
          token: ${{ github.token }}
      - id: next-release-milestone
        name: "Compute Milestone After ${{ needs.planner.outputs.release-version }}"
        uses: ./compute-next-version
        with:
          version: ${{ needs.planner.outputs.release-version }}
          token: ${{ github.token }}
          projects-api-base: '.'
      - name: "Ensure ${{ steps.next-release-milestone.outputs.version }} Scheduled"
        uses: ./schedule-milestone
        if: ${{ steps.next-release-milestone.outputs.version-type  == 'oss' }}
        with:
          version: ${{ steps.next-release-milestone.outputs.version }}
          version-date: ${{ steps.next-release-milestone.outputs.version-date }}
          token: ${{ github.token }}
      - id: next-next-release-milestone
        name: "Compute Milestone After ${{ steps.next-release-milestone.outputs.version }}"
        uses: ./compute-next-version
        if: ${{ steps.next-release-milestone.outputs.version-type  == 'oss' }}
        with:
          version: ${{ steps.next-release-milestone.outputs.version }}
          token: ${{ github.token }}
          projects-api-base: '.'
      - name: "Ensure ${{ steps.next-next-release-milestone.outputs.version }} Scheduled"
        uses: ./schedule-milestone
        if: ${{ steps.next-next-release-milestone.outputs.version-type  == 'oss' }}
        with:
          version: ${{ steps.next-next-release-milestone.outputs.version }}
          version-date: ${{ steps.next-next-release-milestone.outputs.version-date }}
          token: ${{ github.token }}
      - name: Announce Release on GChat
        uses: ./announce-on-gchat
        with:
          version: ${{ needs.planner.outputs.release-version }}
          gchat-webhook-url: ${{ secrets.SPRING_RELEASE_GCHAT_WEBHOOK_URL }}
      - name: Plan Release on GChat
        uses: ./plan-on-gchat
        if: ${{ steps.next-release-milestone.outputs.version-type  == 'oss' }}
        with:
          version: ${{ steps.next-release-milestone.outputs.version }}
          version-date: ${{ steps.next-release-milestone.outputs.version-date }}
          gchat-webhook-url: ${{ secrets.SPRING_RELEASE_GCHAT_WEBHOOK_URL }}