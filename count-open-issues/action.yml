name: "count-open-issues"
description: "Count the open issues tied to a given milestone"
author: "jzheaux"
inputs:
  milestone:
    description: "The milestone to count open issues for"
    required: true

outputs:
  count:
    description: "The issue count"
    value: ${{ steps.count-issues.outputs.count }}

runs:
  using: "composite"
  steps:
    - name: "Count open issues for ${{ inputs.milestone }}"
      id: count-issues
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        MILESTONE: ${{ inputs.milestone }}
      run: |
        ISSUE_COUNT=$(gh issue list --milestone "${MILESTONE}" | wc -l)
        PR_COUNT=$(gh pr list --search "milestone:${MILESTONE}" | wc -l)
        echo count=$((ISSUE_COUNT + PR_COUNT)) >> $GITHUB_OUTPUT